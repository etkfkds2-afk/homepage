<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 홈페이지</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
    header { background: #111; color: white; padding: 24px; text-align: center; }
    section { max-width: 900px; margin: 40px auto; background: white; padding: 32px; border-radius: 16px; }
    button { background: black; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <h1>내 홈페이지</h1>
    <p>HTML로 만든 첫 페이지</p>
  </header>
  <section>
    <h2>소개</h2>
    <p>여기에 회사 소개, 서비스 소개, 포트폴리오 등을 넣을 수 있습니다.</p>
    <button onclick="alert('버튼 클릭됨!')">문의하기</button>
  </section>
</body>
</html>
