<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NewsBrief</title>
<style>
:root{--ink:#14213d;--muted:#657085;--line:#e8ebf0;--paper:#f6f7f9;--brand:#2255d9;--danger:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif}button,input{font:inherit}button{cursor:pointer}.wrap{width:min(1180px,calc(100% - 28px));margin:auto}header{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}.head{display:flex;align-items:center;gap:18px;min-height:72px}.logo{font-size:23px;font-weight:850;letter-spacing:-1px}.logo span{color:var(--brand)}.search{flex:1;max-width:460px}.search input{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 14px;background:#f9fafb}.status{margin-left:auto;color:var(--muted);font-size:13px}.tabs{display:flex;gap:7px;padding:18px 0 8px;overflow:auto}.tab{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:99px;padding:8px 14px;color:#465066}.tab.on{background:var(--ink);border-color:var(--ink);color:#fff}.toolbar{display:flex;align-items:center;gap:9px;padding:13px 0}.toolbar h1{margin:0 auto 0 0;font-size:20px}.smallbtn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 11px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:0 0 50px}.card{display:flex;flex-direction:column;min-height:290px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 3px 14px rgba(20,33,61,.035)}.meta{display:flex;gap:7px;align-items:center;color:var(--muted);font-size:12px}.cat{color:var(--brand);font-weight:750}.title{margin:12px 0 11px;color:var(--ink);font-size:18px;line-height:1.42;font-weight:780;text-decoration:none;letter-spacing:-.35px}.title:hover{text-decoration:underline}.summary{margin:0;color:#3f4858;font-size:14px;line-height:1.65;white-space:pre-line}.actions{display:flex;gap:7px;margin-top:auto;padding-top:16px}.action{border:1px solid var(--line);border-radius:9px;background:#fff;padding:7px 10px;font-size:13px}.action.saved{color:#b45309;background:#fff8e8}.action.hide{margin-left:auto;color:var(--danger)}.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}.error{color:var(--danger)}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){.head{flex-wrap:wrap;padding:12px 0}.search{order:3;flex-basis:100%;max-width:none}.status{font-size:11px}.grid{grid-template-columns:1fr}.card{min-height:250px}}
</style></head><body>
<header><div class="wrap head"><div class="logo">News<span>Brief</span></div><form class="search" id="search"><input id="query" placeholder="제목·요약·언론사 검색" autocomplete="off"></form><div class="status" id="status">연결 확인 중</div></div></header>
<main class="wrap"><nav class="tabs" id="categories"></nav><section class="toolbar"><h1 id="heading">최신 뉴스</h1><button class="smallbtn" id="latest">최신</button><button class="smallbtn" id="saved">★ 저장</button><button class="smallbtn" id="reload">새로고침</button></section><section class="grid" id="cards"><div class="empty">뉴스를 불러오는 중입니다.</div></section></main>
<script>
const categories=['전체','정치','경제','사회','생활/문화','세계','IT/과학','바둑'];const state={category:'전체',view:'latest',q:'',items:[]};const $=id=>document.getElementById(id);const escapeHtml=value=>String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));const formatDate=value=>{if(!value)return '';const date=new Date(value);return Number.isNaN(date.valueOf())?'':new Intl.DateTimeFormat('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}).format(date)};
function renderTabs(){$('categories').innerHTML=categories.map(cat=>`<button class="tab ${cat===state.category?'on':''}" data-cat="${cat}">${cat}</button>`).join('')}function render(){$('heading').textContent=state.view==='saved'?'저장한 뉴스':state.category==='전체'?'최신 뉴스':`${state.category} 뉴스`;$('cards').innerHTML=state.items.length?state.items.map(item=>`<article class="card" data-key="${escapeHtml(item.url_key)}"><div class="meta"><span class="cat">${escapeHtml(item.category)}</span><span>${escapeHtml(item.press||item.source)}</span><span>·</span><time>${escapeHtml(formatDate(item.published_at||item.fetched_at))}</time></div><a class="title" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a><p class="summary">${escapeHtml(item.summary)}</p><div class="actions"><button class="action save ${item.saved?'saved':''}" data-action="${item.saved?'unsave':'save'}">${item.saved?'★ 저장됨':'☆ 저장'}</button><button class="action hide" data-action="hide">숨기기</button></div></article>`).join(''):`<div class="empty">표시할 뉴스가 없습니다.</div>`}
async function load(){$('cards').innerHTML='<div class="empty">뉴스를 불러오는 중입니다.</div>';const params=new URLSearchParams({view:state.view,limit:'90'});if(state.category!=='전체')params.set('category',state.category);if(state.q)params.set('q',state.q);try{const response=await fetch(`/api/news/articles?${params}`);const data=await response.json();if(!response.ok)throw new Error(data.error||'불러오기 실패');state.items=data.items||[];render()}catch(error){$('cards').innerHTML=`<div class="empty error">${escapeHtml(error.message)}</div>`}}async function status(){try{const data=await fetch('/api/news/status').then(r=>r.json());$('status').textContent=data.ok?`${data.article_count}건 · ${data.last_run?.status==='ok'?'자동 수집 정상':'수집 대기'}`:'연결 오류'}catch{$('status').textContent='연결 오류'}}
$('categories').addEventListener('click',event=>{const cat=event.target.dataset.cat;if(!cat)return;state.category=cat;renderTabs();load()});$('cards').addEventListener('click',async event=>{const action=event.target.dataset.action;if(!action)return;const card=event.target.closest('.card');event.target.disabled=true;try{const response=await fetch('/api/news/item',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({action,url_key:card.dataset.key})});if(!response.ok)throw new Error();await load()}catch{event.target.disabled=false;alert('처리하지 못했습니다. 다시 시도해 주세요.')}});$('search').addEventListener('submit',event=>{event.preventDefault();state.q=$('query').value.trim();load()});$('latest').onclick=()=>{state.view='latest';load()};$('saved').onclick=()=>{state.view='saved';load()};$('reload').onclick=()=>{load();status()};renderTabs();load();status();setInterval(()=>{if(state.view==='latest')load();status()},300000);
</script></body></html>
