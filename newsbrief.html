<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NewsBrief</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--chip:#f3f4f6;--go:#0f766e;--shadow-sm:0 1px 2px rgba(16,24,40,.06);--shadow-md:0 14px 34px rgba(16,24,40,.12)}*{box-sizing:border-box}body{font-family:ui-sans-serif,system-ui,-apple-system,"Noto Sans KR",sans-serif;margin:22px auto;padding:0 20px 48px;max-width:1480px;color:var(--text);background:var(--bg);font-size:14.5px;line-height:1.45}button,input{font:inherit}.top{position:sticky;top:12px;z-index:20;display:flex;gap:18px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px;padding:16px 18px;border:1px solid rgba(229,231,235,.78);border-radius:20px;background:rgba(255,255,255,.92);box-shadow:0 14px 36px rgba(16,24,40,.07);backdrop-filter:blur(10px)}.brand{display:inline-flex;align-items:center;font-weight:950;font-size:21px;letter-spacing:-.8px;line-height:1}.brand-news{color:#0f172a}.brand-brief{color:#0f766e}.brand:after{content:"";width:5px;height:5px;margin:0 0 12px 4px;border-radius:50%;background:#14b8a6;box-shadow:0 0 0 3px rgba(20,184,166,.12)}.tagline{margin-top:8px;color:var(--muted);font-size:12.5px;line-height:1.5}.controls{display:flex;flex-direction:column;gap:10px;align-items:flex-end}.filterbar,.searchbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.pill{padding:7px 11px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.9);font-size:13px;font-weight:700;cursor:pointer}.pill:hover{border-color:#9ca3af}.pill.on{background:#111827;color:#fff;border-color:#111827;box-shadow:0 10px 18px rgba(17,24,39,.16)}.pill.baduk{border-color:rgba(15,118,110,.28);color:var(--go)}.pill.baduk.on{background:var(--go);color:#fff}.pill.setting{color:#64748b}.filterbar .pill{padding:5px 11px;font-size:11.5px;color:#64748b}.searchbar input{padding:9px 12px;border:1px solid #d1d5db;border-radius:12px;min-width:250px;outline:none}.searchbar input:focus{border-color:#64748b;box-shadow:0 0 0 3px rgba(100,116,139,.12)}.searchbar button{padding:9px 12px;border:1px solid #d1d5db;border-radius:12px;background:#fff;font-weight:900;cursor:pointer}.homehero{margin:10px 0 32px}.home-date{font-weight:950;font-size:20px;margin:4px 2px 12px;letter-spacing:-.55px}.hotcard{border:1px solid rgba(15,23,42,.1);border-radius:22px;background:#fff;box-shadow:0 18px 40px rgba(15,23,42,.06);padding:18px}.hothead{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}.hotbadge{display:inline-flex;height:28px;padding:0 12px;align-items:center;border-radius:999px;background:#0b1220;color:#fff;font-size:11px;font-weight:950;letter-spacing:.9px}.hotmeta{margin-left:8px;color:#475569;font-size:12px;font-weight:850}.hottitle{margin-top:8px;font-size:22px;font-weight:950;letter-spacing:-.6px}.hotsub{margin-top:6px;color:#64748b;font-size:13px;font-weight:750}.hotpage{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;background:rgba(248,250,252,.7)}.hotchip{display:flex;align-items:center;gap:12px;min-height:56px;padding:12px 14px;border-bottom:1px solid #e2e8f0;text-decoration:none;color:#0b1220}.hotchip:nth-child(odd){border-right:1px solid #e2e8f0}.hotchip:hover{background:rgba(15,23,42,.035)}.hotrank{display:inline-flex;width:34px;height:22px;align-items:center;justify-content:center;border-radius:8px;background:rgba(15,23,42,.05);font-size:12px;font-weight:950}.hottext{flex:1;min-width:0;font-size:14px;font-weight:900;line-height:1.35}.hotrelated{font-size:11px;color:#0f766e;font-weight:850;white-space:nowrap}.sectionTitle{margin:18px 12px 10px;font-size:16px;font-weight:950}.sectionDesc{display:block;margin-top:3px;color:var(--muted);font-size:12px;font-weight:600}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.card{display:flex;flex-direction:column;border:1px solid rgba(229,231,235,.95);border-radius:18px;background:var(--card);padding:15px;min-height:154px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:opacity .18s,transform .12s,box-shadow .12s}.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}.card.removing{opacity:0;transform:scale(.98);pointer-events:none}.card.cat-baduk{border-color:rgba(15,118,110,.28);background:linear-gradient(180deg,rgba(15,118,110,.06),#fff 44%)}.card.cat-baduk:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--go)}.meta{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}.meta-left,.meta-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.tag{padding:2px 9px;border:1px solid var(--line);border-radius:999px;font-size:11px;background:var(--chip);color:#374151;font-weight:650}.time{color:var(--muted);font-size:11px;font-weight:700}.row{display:flex;gap:12px;align-items:flex-start}.thumb{flex:0 0 92px;width:92px;height:92px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:linear-gradient(135deg,#fafafa,#f1f3f7)}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.content{flex:1;min-width:0}.title{font-weight:750;font-size:15px;line-height:1.4;letter-spacing:-.2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-decoration:none;color:var(--text)}.title:hover{text-decoration:underline}.sum{margin-top:10px;color:#111827;font-size:13px;line-height:1.65}.sline+.sline{margin-top:7px}.related{margin-top:10px;border-top:1px solid #edf0f3;padding-top:8px}.related summary{cursor:pointer;color:#0f766e;font-size:12px;font-weight:850;list-style:none}.related summary::-webkit-details-marker{display:none}.related summary:after{content:" 펼치기";color:#94a3b8;font-size:10px}.related[open] summary:after{content:" 접기"}.related-list{display:grid;gap:6px;margin-top:8px}.related-link{color:#475569;font-size:11.5px;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.related-link:hover{text-decoration:underline}.actions{display:flex;justify-content:flex-end;gap:6px;margin-top:auto;padding-top:10px}.act{display:inline-flex;align-items:center;padding:6px 9px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:11px;font-weight:720}.act:disabled{opacity:.55;cursor:wait}.act.on{background:#111827;border-color:#111827;color:#fff}.act.del{color:#6b7280}.empty{grid-column:1/-1;border:1px dashed #d1d5db;border-radius:18px;background:#fff;padding:40px;text-align:center;color:#6b7280}.status{font-size:12px;color:var(--muted)}.toast{position:fixed;left:50%;bottom:28px;z-index:40;transform:translate(-50%,20px);padding:10px 15px;border-radius:12px;background:#111827;color:#fff;box-shadow:var(--shadow-md);font-size:12px;font-weight:750;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}body{margin:16px auto;padding:0 14px}}@media(max-width:680px){.top{position:relative;top:0}.controls,.searchbar{width:100%;align-items:stretch}.sectionBar,.subnavWrap,.filterbar{justify-content:flex-start}.searchbar input{flex:1;min-width:0}.grid,.hotpage{grid-template-columns:1fr}.hotchip:nth-child(odd){border-right:0}.thumb{flex-basis:82px;width:82px;height:82px}}
.title{color:var(--text)}
.brand-news{color:#2563eb}
.sectionBar{display:flex;gap:6px;align-items:center;justify-content:flex-end}.sectionPill{padding:8px 18px;border:none;border-radius:12px;background:transparent;font-size:15px;font-weight:900;letter-spacing:-.2px;cursor:pointer;color:#94a3b8}.sectionPill:hover{color:#475569}.sectionPill.on{background:#111827;color:#fff}.sectionPill.baduk{color:var(--go)}.sectionPill.baduk.on{background:var(--go);color:#fff}
.subnavWrap{display:flex;gap:3px;align-items:center;justify-content:flex-end;padding:4px;background:var(--chip);border-radius:14px}.subnavWrap .pill{border:none;background:transparent;box-shadow:none;padding:6px 13px;font-size:12.5px;font-weight:700;color:#64748b}.subnavWrap .pill:hover{border-color:transparent;color:#334155}.subnavWrap .pill.on{background:#fff;color:#111827;box-shadow:0 1px 3px rgba(15,23,42,.14)}
.issuePanel{margin:0 0 22px;padding:18px;border:1px solid rgba(15,23,42,.1);border-radius:20px;background:linear-gradient(135deg,#fff,#f8fafc);box-shadow:var(--shadow-sm)}.issueHead{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:12px}.issueTitle{font-size:17px;font-weight:950;letter-spacing:-.35px}.issueDesc{margin-top:3px;color:var(--muted);font-size:11.5px}.issueGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.issueCard{display:block;min-width:0;padding:13px;border:1px solid #e2e8f0;border-radius:15px;background:#fff;text-decoration:none;color:var(--text);transition:.15s}.issueCard:hover{border-color:#94a3b8;transform:translateY(-1px);box-shadow:var(--shadow-sm)}.issueName{font-size:14px;font-weight:900;line-height:1.35}.issueMeta{margin-top:7px;color:#0f766e;font-size:11px;font-weight:800}.issueEmpty{color:var(--muted);font-size:12px;padding:8px 2px}@media(max-width:680px){.issueGrid{grid-template-columns:1fr 1fr}.issuePanel{padding:14px}}@media(max-width:420px){.issueGrid{grid-template-columns:1fr}}
</style><style>.card.issue-focus{outline:3px solid rgba(15,118,110,.3);outline-offset:3px;box-shadow:0 0 0 6px rgba(15,118,110,.08)}</style></head><body>
<header class="top"><div><div class="brand" aria-label="NewsBrief"><span class="brand-news">News</span><span class="brand-brief">Brief</span></div><div class="tagline">오늘의 뉴스를 3줄로 정리해, 판단을 가볍게.<br>중요한 기사만 저장하고 미래의 나에게 남기세요.</div></div><div class="controls"><div class="sectionBar"><button class="sectionPill baduk" data-section="baduk">바둑</button><button class="sectionPill" data-section="general">일반</button></div><div class="subnavWrap" id="subNav"></div><div class="filterbar" id="categories"></div><form class="searchbar" id="search"><input id="query" aria-label="뉴스 검색"><button>검색</button></form></div></header>
<section class="homehero" id="hero"><div class="home-date" id="date"></div><div class="hotcard"><div class="hothead"><div><span class="hotbadge">24H</span><span class="hotmeta" id="updated"></span><div class="hottitle">오늘의 핵심 뉴스</div></div></div><div class="hotpage" id="hot"></div></div></section>
<section class="issuePanel" id="issuesPanel" aria-labelledby="issuesTitle"><div class="issueHead"><div><div class="issueTitle" id="issuesTitle">일간 이슈 키워드</div><div class="issueDesc" id="issuesDesc"></div></div><button class="pill" id="clearIssue" type="button" style="display:none">전체 이슈 보기</button></div><div class="issueGrid" id="issues"></div></section>
<div class="sectionTitle" id="sectionTitle">일간 뉴스 요약</div><main class="grid" id="cards"><div class="empty">뉴스를 불러오는 중입니다.</div></main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
const cats=['정치','경제','사회','생활/문화','세계','IT/과학'];
const state={section:'baduk',genView:'home',badukView:'home',category:'',q:'',issueKey:'',items:[],heroItems:[],issueItems:[],requestSeq:0};
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const USER_KEY='newsbrief_user_id_v1';
const userId=(()=>{let id=localStorage.getItem(USER_KEY);if(!id){id=crypto.randomUUID();localStorage.setItem(USER_KEY,id)}return id})();
const parseTime=v=>new Date(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(String(v||''))?`${v.replace(' ','T')}Z`:v);
const fmt=v=>{const d=parseTime(v);return Number.isNaN(+d)?'':new Intl.DateTimeFormat('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}).format(d)};
const relTime=ms=>{
  const min=Math.max(0,Math.floor((Date.now()-ms)/60000));
  if(min<1)return'방금';
  if(min<60)return`${min}분 전`;
  const hr=Math.floor(min/60),rem=min%60;
  if(hr<24)return rem?`${hr}시간 ${rem}분 전`:`${hr}시간 전`;
  return`${Math.floor(hr/24)}일 전`;
};
let toastTimer;
function toast(message){clearTimeout(toastTimer);$('toast').textContent=message;$('toast').classList.add('show');toastTimer=setTimeout(()=>$('toast').classList.remove('show'),1800)}
async function fetchJson(url,options){
  const config={...(options||{}),headers:{...(options?.headers||{}),'x-news-user':userId}};
  const response=await fetch(url,config);
  const type=(response.headers.get('content-type')||'').toLowerCase();
  if(!type.includes('application/json')){
    throw Error(response.ok?'서버 응답 형식이 올바르지 않습니다. 잠시 후 다시 시도해 주세요.':'서버가 잠시 응답하지 않습니다. 잠시 후 다시 시도해 주세요.');
  }
  let data;
  try{data=await response.json()}catch{throw Error('서버 응답을 읽지 못했습니다. 잠시 후 다시 시도해 주세요.')}
  if(!response.ok)throw Error(data?.error||'뉴스를 불러오지 못했습니다.');
  return data;
}
const SUBVIEWS={
  general:[['home','홈'],['weekly','주간'],['monthly','월간'],['saved','저장']],
  baduk:[['home','홈'],['weekly','주간'],['monthly','월간'],['saved','저장']]
};
function currentSubview(){return state.section==='baduk'?state.badukView:state.genView}
function setSubview(value){if(state.section==='baduk')state.badukView=value;else state.genView=value}
function nav(){
  document.querySelectorAll('[data-section]').forEach(b=>b.classList.toggle('on',b.dataset.section===state.section));
  const sub=currentSubview();
  $('subNav').innerHTML=SUBVIEWS[state.section].map(([value,label])=>`<button class="pill ${sub===value?'on':''}" data-subview="${value}">${label}</button>`).join('');
  const show=state.section==='general'&&(sub==='weekly'||sub==='monthly');
  $('categories').style.display=show?'flex':'none';
  $('categories').innerHTML=show?cats.map(c=>`<button class="pill ${state.category===c?'on':''}" data-cat="${c}">${c}</button>`).join(''):'';
}
function renderHero(){
  const show=currentSubview()==='home'&&!state.q;
  $('hero').style.display=show?'block':'none';
  if(!show)return;
  $('date').textContent=new Intl.DateTimeFormat('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'}).format(new Date());
  const refreshed=[...state.heroItems,...state.items].map(x=>+parseTime(x.fetched_at||'')).filter(Number.isFinite).sort((a,b)=>b-a)[0];
  $('updated').textContent=refreshed?`${relTime(refreshed)} 갱신`:'';
  $('hot').innerHTML=state.heroItems.map((x,i)=>`<a class="hotchip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="hotrank">${String(i+1).padStart(2,'0')}</span><span class="hottext">${esc(x.title)}</span>${x.related_count?`<span class="hotrelated">관련 ${x.related_count+1}건</span>`:''}<span aria-hidden="true">↗</span></a>`).join('')||'<div class="empty">핵심 뉴스를 준비하고 있습니다.</div>';
}
function renderIssues(){
  const sub=currentSubview();
  const show=Boolean(state.issueItems.length)&&!state.q&&sub!=='saved'&&sub!=='home';
  $('issuesPanel').style.display=show?'block':'none';
  if(!show)return;
  $('issuesTitle').textContent=sub==='weekly'?'주간 이슈 키워드':'월간 이슈 키워드';
  $('issuesDesc').textContent='';
  $('clearIssue').style.display=state.issueKey?'inline-flex':'none';
  $('issues').innerHTML=state.issueItems.map(issue=>`<a class="issueCard" href="#issue-${encodeURIComponent(issue.key)}" data-issue-key="${esc(issue.key)}"><div class="issueName">${esc(issue.title)}</div><div class="issueMeta">관련 기사 ${issue.count}건 · 전체 카드 보기 ↓</div></a>`).join('')||'<div class="issueEmpty">아직 식별된 이슈가 없습니다.</div>';
}
function relatedHtml(item){
  if(!item.related_count)return'';
  return `<details class="related"><summary>관련 보도 ${item.related_count}건</summary><div class="related-list">${item.related.map(x=>`<a class="related-link" href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.outlet)} · ${esc(x.title)}</a>`).join('')}</div></details>`;
}
function cardHtml(x){
  const actions=`<button class="act ${x.saved?'on':''}" data-action="${x.saved?'unsave':'save'}">${x.saved?'저장됨':'저장'}</button><button class="act del" data-action="hide">삭제</button>`;
  return `<article class="card ${x.category==='바둑'?'cat-baduk':''}" id="article-${esc(x.url_key)}" data-key="${esc(x.url_key)}"><div class="meta"><div class="meta-left"><span class="tag">${esc(x.outlet||x.press||x.source)}</span><span class="tag">${esc(x.category)}</span></div><span class="time">${esc(fmt(x.published_at||x.fetched_at))}</span></div><div class="row"><a class="thumb" href="${esc(x.url)}" target="_blank" rel="noopener"><img src="/api/news/image?key=${encodeURIComponent(x.url_key)}" alt="" loading="lazy" onerror="this.remove()"></a><div class="content"><a class="title" href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.title)}</a><div class="sum">${String(x.summary||'').split('\n').map(s=>`<div class="sline">${esc(s)}</div>`).join('')}</div>${relatedHtml(x)}</div></div><div class="actions">${actions}</div></article>`;
}
function render(){
  nav();renderHero();renderIssues();
  const sub=currentSubview();
  const periodLabels={home:['일간 뉴스 요약',''],weekly:['주간 뉴스 요약',''],monthly:['월간 뉴스 요약','']};
  const savedLabel=state.section==='baduk'?['저장한 바둑 뉴스','']:['저장한 뉴스',''];
  const base=sub==='saved'?savedLabel:(periodLabels[sub]||['뉴스','']);
  const selectedIssue=state.issueKey?state.issueItems.find(i=>i.key===state.issueKey):null;
  const label=selectedIssue?[selectedIssue.title,'']:(state.section==='general'&&state.category?[`${state.category} 최신 뉴스`,'']:base);
  $('sectionTitle').innerHTML=`${esc(label[0])}${label[1]?`<span class="sectionDesc">${esc(label[1])}</span>`:''}`;
  const visible=state.items;
  $('cards').innerHTML=visible.length?visible.map(cardHtml).join(''):'<div class="empty">조건에 맞는 뉴스가 아직 없습니다.</div>';
}
async function load({silent=false}={}){
  const requestId=++state.requestSeq;nav();
  if(!silent)$('cards').innerHTML='<div class="empty">뉴스를 불러오는 중입니다.</div>';
  const sub=currentSubview();
  const isBaduk=state.section==='baduk';
  try{
    if(sub==='home'&&!state.q&&!state.issueKey){
      const catBit=isBaduk?'category=%EB%B0%94%EB%91%91':'exclude_baduk=1';
      const heroUrl=`/api/news/articles?view=latest&${catBit}&limit=6&hours=24`;
      const cardsUrl=`/api/news/articles?view=latest&${catBit}&limit=30&hours=24`;
      const [home,popular]=await Promise.all([fetchJson(cardsUrl),fetchJson(heroUrl)]);
      if(requestId!==state.requestSeq)return;
      state.heroItems=popular.items||[];
      state.items=home.items||[];
      state.issueItems=[];
    }else{
      const p=new URLSearchParams({limit:isBaduk?'150':'300',view:sub==='saved'?'saved':'latest'});
      if(isBaduk){
        p.set('category','바둑');
      }else{
        p.set('exclude_baduk','1');
        if(state.category)p.set('category',state.category);
      }
      if(!state.issueKey){
        if(sub==='weekly')p.set('hours','168');
        else if(sub==='monthly')p.set('hours','720');
      }
      if(state.q)p.set('q',state.q);
      if(state.issueKey)p.set('issue_key',state.issueKey);
      if(sub!=='saved')p.set('issues','1');
      const d=await fetchJson(`/api/news/articles?${p}`);if(requestId!==state.requestSeq)return;
      state.heroItems=[];state.items=d.items||[];state.issueItems=d.issues||[];
    }
    render()
  }
  catch(e){if(requestId===state.requestSeq&&!silent)$('cards').innerHTML=`<div class="empty">${esc(e.message||'불러오기 실패')}</div>`}
}
document.addEventListener('click',e=>{
  if(e.target.closest('#clearIssue')){state.issueKey='';load();return}
  const issue=e.target.closest('[data-issue-key]');
  if(issue){
    e.preventDefault();
    state.issueKey=issue.dataset.issueKey;load();
    return;
  }
  const section=e.target.dataset.section;
  if(section){state.section=section;state.category='';state.q='';state.issueKey='';$('query').value='';load();return}
  const subview=e.target.dataset.subview;
  if(subview){setSubview(subview);state.category='';state.q='';state.issueKey='';$('query').value='';load();return}
  const category=e.target.dataset.cat;
  if(category){state.category=category;state.issueKey='';load()}
});
$('cards').addEventListener('click',async e=>{
  const action=e.target.dataset.action;if(!action)return;
  const button=e.target,card=button.closest('.card'),key=card.dataset.key;
  button.disabled=true;
  try{
    const r=await fetch('/api/news/item',{method:'POST',headers:{'content-type':'application/json','x-news-user':userId},body:JSON.stringify({action,url_key:key})});
    if(!r.ok)throw Error();
    const item=state.items.find(x=>x.url_key===key);
    if(action==='save'&&item){item.saved=1;button.dataset.action='unsave';button.textContent='저장됨';button.classList.add('on');button.disabled=false;toast('기사를 저장했습니다.');return}
    if(action==='unsave'&&currentSubview()!=='saved'&&item){item.saved=0;button.dataset.action='save';button.textContent='저장';button.classList.remove('on');button.disabled=false;toast('저장을 해제했습니다.');return}
    card.classList.add('removing');setTimeout(()=>{state.items=state.items.filter(x=>x.url_key!==key);card.remove();if(!$('cards').querySelector('.card'))render()},180);toast(action==='hide'?'기사를 삭제했습니다.':'저장을 해제했습니다.');
  }catch{button.disabled=false;toast('처리하지 못했습니다. 다시 시도해 주세요.')}
});
$('search').onsubmit=e=>{e.preventDefault();state.q=$('query').value.trim();load()};
nav();load();
// Keep home, latest, popular, and baduk views on the same three-hour refresh.
setInterval(()=>load({silent:true}),10800000);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')load({silent:true})});
</script></body></html>
