<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NewsBrief</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--chip:#f3f4f6;--go:#0f766e;--shadow-sm:0 1px 2px rgba(16,24,40,.06);--shadow-md:0 14px 34px rgba(16,24,40,.12)}*{box-sizing:border-box}body{font-family:ui-sans-serif,system-ui,-apple-system,"Noto Sans KR",sans-serif;margin:22px auto;padding:0 20px 48px;max-width:1480px;color:var(--text);background:var(--bg);font-size:14.5px;line-height:1.45}button,input{font:inherit}.top{position:sticky;top:12px;z-index:20;display:flex;gap:18px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px;padding:16px 18px;border:1px solid rgba(229,231,235,.78);border-radius:20px;background:rgba(255,255,255,.92);box-shadow:0 14px 36px rgba(16,24,40,.07);backdrop-filter:blur(10px)}.brand{display:inline-flex;align-items:center;font-weight:950;font-size:21px;letter-spacing:-.8px;line-height:1}.brand-news{color:#0f172a}.brand-brief{color:#0f766e}.brand:after{content:"";width:5px;height:5px;margin:0 0 12px 4px;border-radius:50%;background:#14b8a6;box-shadow:0 0 0 3px rgba(20,184,166,.12)}.tagline{margin-top:8px;color:var(--muted);font-size:12.5px;line-height:1.5}.controls{display:flex;flex-direction:column;gap:10px;align-items:flex-end}.modebar,.filterbar,.searchbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.pill{padding:7px 11px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.9);font-size:13px;font-weight:700;cursor:pointer}.pill:hover{border-color:#9ca3af}.pill.on{background:#111827;color:#fff;border-color:#111827;box-shadow:0 10px 18px rgba(17,24,39,.16)}.pill.baduk{border-color:rgba(15,118,110,.28);color:var(--go)}.pill.baduk:before{content:"●";margin-right:6px;font-size:11px}.pill.baduk.on{background:var(--go);color:#fff}.pill.setting{color:#64748b}.filterbar .pill{padding:5px 11px;font-size:11.5px;color:#64748b}.searchbar input{padding:9px 12px;border:1px solid #d1d5db;border-radius:12px;min-width:250px;outline:none}.searchbar input:focus{border-color:#64748b;box-shadow:0 0 0 3px rgba(100,116,139,.12)}.searchbar button{padding:9px 12px;border:1px solid #d1d5db;border-radius:12px;background:#fff;font-weight:900;cursor:pointer}.homehero{margin:10px 0 32px}.home-date{font-weight:950;font-size:20px;margin:4px 2px 12px;letter-spacing:-.55px}.hotcard{border:1px solid rgba(15,23,42,.1);border-radius:22px;background:#fff;box-shadow:0 18px 40px rgba(15,23,42,.06);padding:18px}.hothead{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}.hotbadge{display:inline-flex;height:28px;padding:0 12px;align-items:center;border-radius:999px;background:#0b1220;color:#fff;font-size:11px;font-weight:950;letter-spacing:.9px}.hotmeta{margin-left:8px;color:#475569;font-size:12px;font-weight:850}.hottitle{margin-top:8px;font-size:22px;font-weight:950;letter-spacing:-.6px}.hotsub{margin-top:6px;color:#64748b;font-size:13px;font-weight:750}.hotpage{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;background:rgba(248,250,252,.7)}.hotchip{display:flex;align-items:center;gap:12px;min-height:56px;padding:12px 14px;border-bottom:1px solid #e2e8f0;text-decoration:none;color:#0b1220}.hotchip:nth-child(odd){border-right:1px solid #e2e8f0}.hotchip:hover{background:rgba(15,23,42,.035)}.hotrank{display:inline-flex;width:34px;height:22px;align-items:center;justify-content:center;border-radius:8px;background:rgba(15,23,42,.05);font-size:12px;font-weight:950}.hottext{flex:1;min-width:0;font-size:14px;font-weight:900;line-height:1.35}.hotrelated{font-size:11px;color:#0f766e;font-weight:850;white-space:nowrap}.sectionTitle{margin:18px 12px 10px;font-size:16px;font-weight:950}.sectionDesc{display:block;margin-top:3px;color:var(--muted);font-size:12px;font-weight:600}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.card{display:flex;flex-direction:column;border:1px solid rgba(229,231,235,.95);border-radius:18px;background:var(--card);padding:15px;min-height:154px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:opacity .18s,transform .12s,box-shadow .12s}.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}.card.removing{opacity:0;transform:scale(.98);pointer-events:none}.card.cat-baduk{border-color:rgba(15,118,110,.28);background:linear-gradient(180deg,rgba(15,118,110,.06),#fff 44%)}.card.cat-baduk:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--go)}.meta{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}.meta-left,.meta-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.tag{padding:2px 9px;border:1px solid var(--line);border-radius:999px;font-size:11px;background:var(--chip);color:#374151;font-weight:650}.time{color:var(--muted);font-size:11px;font-weight:700}.row{display:flex;gap:12px;align-items:flex-start}.thumb{flex:0 0 92px;width:92px;height:92px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:linear-gradient(135deg,#fafafa,#f1f3f7)}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.content{flex:1;min-width:0}.title{font-weight:750;font-size:15px;line-height:1.4;letter-spacing:-.2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-decoration:none;color:var(--text)}.title:hover{text-decoration:underline}.sum{margin-top:10px;color:#111827;font-size:13px;line-height:1.65}.sline+.sline{margin-top:7px}.related{margin-top:10px;border-top:1px solid #edf0f3;padding-top:8px}.related summary{cursor:pointer;color:#0f766e;font-size:12px;font-weight:850;list-style:none}.related summary::-webkit-details-marker{display:none}.related summary:after{content:" 펼치기";color:#94a3b8;font-size:10px}.related[open] summary:after{content:" 접기"}.related-list{display:grid;gap:6px;margin-top:8px}.related-link{color:#475569;font-size:11.5px;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.related-link:hover{text-decoration:underline}.actions{display:flex;justify-content:flex-end;gap:6px;margin-top:auto;padding-top:10px}.act{display:inline-flex;align-items:center;padding:6px 9px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:11px;font-weight:720}.act:disabled{opacity:.55;cursor:wait}.act.on{background:#111827;border-color:#111827;color:#fff}.act.del{color:#6b7280}.empty{grid-column:1/-1;border:1px dashed #d1d5db;border-radius:18px;background:#fff;padding:40px;text-align:center;color:#6b7280}.status{font-size:12px;color:var(--muted)}.toast{position:fixed;left:50%;bottom:28px;z-index:40;transform:translate(-50%,20px);padding:10px 15px;border-radius:12px;background:#111827;color:#fff;box-shadow:var(--shadow-md);font-size:12px;font-weight:750;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}body{margin:16px auto;padding:0 14px}}@media(max-width:680px){.top{position:relative;top:0}.controls,.searchbar{width:100%;align-items:stretch}.modebar,.filterbar{justify-content:flex-start}.searchbar input{flex:1;min-width:0}.grid,.hotpage{grid-template-columns:1fr}.hotchip:nth-child(odd){border-right:0}.thumb{flex-basis:82px;width:82px;height:82px}}
.title{color:var(--text)}
.hotmodes{display:flex;gap:7px;align-items:center}.hotmodes .pill{padding:6px 11px;font-size:12px}
.brand-news{color:#2563eb}
</style></head><body>
<header class="top"><div><div class="brand" aria-label="NewsBrief"><span class="brand-news">News</span><span class="brand-brief">Brief</span></div><div class="tagline">오늘의 뉴스를 3줄로 정리해, 판단을 가볍게.<br>중요한 기사만 저장하고 미래의 나에게 남기세요.</div></div><div class="controls"><div class="modebar"><button class="pill on" data-view="home">홈</button><button class="pill baduk" data-view="baduk">바둑</button><button class="pill" data-view="latest">최신순</button><button class="pill" data-view="popular">인기순</button><button class="pill" data-view="saved">저장</button></div><div class="filterbar" id="categories"></div><form class="searchbar" id="search"><input id="query" aria-label="뉴스 검색"><button>검색</button></form></div></header>
<section class="homehero" id="hero"><div class="home-date" id="date"></div><div class="hotcard"><div class="hothead"><div><span class="hotbadge">24H</span><span class="hotmeta" id="updated"></span><div class="hottitle">오늘의 핵심 뉴스</div></div><div class="hotmodes"><button class="pill on" type="button" data-hot="general">일반</button><button class="pill baduk" type="button" data-hot="baduk">바둑</button></div></div><div class="hotpage" id="hot"></div></div></section>
<div class="sectionTitle" id="sectionTitle">지금 주목할 뉴스</div><main class="grid" id="cards"><div class="empty">뉴스를 불러오는 중입니다.</div></main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
const cats=['정치','경제','사회','생활/문화','세계','IT/과학'];
const state={mode:'home',category:'',q:'',items:[],heroItems:[],heroTopic:'baduk',requestSeq:0};
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const USER_KEY='newsbrief_user_id_v1';
const userId=(()=>{let id=localStorage.getItem(USER_KEY);if(!id){id=crypto.randomUUID();localStorage.setItem(USER_KEY,id)}return id})();
const parseTime=v=>new Date(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(String(v||''))?`${v.replace(' ','T')}Z`:v);
const fmt=v=>{const d=parseTime(v);return Number.isNaN(+d)?'':new Intl.DateTimeFormat('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}).format(d)};
let toastTimer;
function toast(message){clearTimeout(toastTimer);$('toast').textContent=message;$('toast').classList.add('show');toastTimer=setTimeout(()=>$('toast').classList.remove('show'),1800)}
async function fetchJson(url,options){
  const config={...(options||{}),headers:{...(options?.headers||{}),'x-news-user':userId}};
  const response=await fetch(url,config);
  const type=(response.headers.get('content-type')||'').toLowerCase();
  if(!type.includes('application/json')){
    throw Error(response.ok?'서버 응답 형식이 올바르지 않습니다. 잠시 후 다시 시도해 주세요.':'서버가 잠시 응답하지 않습니다. 잠시 후 다시 시도해 주세요.');
  }
  let data;
  try{data=await response.json()}catch{throw Error('서버 응답을 읽지 못했습니다. 잠시 후 다시 시도해 주세요.')}
  if(!response.ok)throw Error(data?.error||'뉴스를 불러오지 못했습니다.');
  return data;
}
function nav(){
  document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('on',b.dataset.view===state.mode));
  document.querySelectorAll('[data-hot]').forEach(b=>b.classList.toggle('on',b.dataset.hot===state.heroTopic));
  const show=state.mode==='latest'||state.mode==='popular';
  $('categories').style.display=show?'flex':'none';
  $('categories').innerHTML=show?cats.map(c=>`<button class="pill ${state.category===c?'on':''}" data-cat="${c}">${c}</button>`).join(''):'';
}
function renderHero(){
  const show=state.mode==='home'&&!state.q;
  $('hero').style.display=show?'block':'none';
  if(!show)return;
  $('date').textContent=new Intl.DateTimeFormat('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'}).format(new Date());
  const refreshed=[...state.heroItems,...state.items].map(x=>+parseTime(x.fetched_at||'')).filter(Number.isFinite).sort((a,b)=>b-a)[0];
  $('updated').textContent=refreshed?`${fmt(refreshed)} 최근 갱신`:'';
  $('hot').innerHTML=state.heroItems.map((x,i)=>`<a class="hotchip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="hotrank">${String(i+1).padStart(2,'0')}</span><span class="hottext">${esc(x.title)}</span>${x.related_count?`<span class="hotrelated">관련 ${x.related_count+1}건</span>`:''}<span aria-hidden="true">↗</span></a>`).join('')||'<div class="empty">핵심 뉴스를 준비하고 있습니다.</div>';
}
function relatedHtml(item){
  if(!item.related_count)return'';
  return `<details class="related"><summary>관련 보도 ${item.related_count}건</summary><div class="related-list">${item.related.map(x=>`<a class="related-link" href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.outlet)} · ${esc(x.title)}</a>`).join('')}</div></details>`;
}
function cardHtml(x){
  const actions=`<button class="act ${x.saved?'on':''}" data-action="${x.saved?'unsave':'save'}">${x.saved?'저장됨':'저장'}</button><button class="act del" data-action="hide">삭제</button>`;
  return `<article class="card ${x.category==='바둑'?'cat-baduk':''}" data-key="${esc(x.url_key)}"><div class="meta"><div class="meta-left"><span class="tag">${esc(x.outlet||x.press||x.source)}</span><span class="tag">${esc(x.category)}</span></div><span class="time">${esc(fmt(x.published_at||x.fetched_at))}</span></div><div class="row"><a class="thumb" href="${esc(x.url)}" target="_blank" rel="noopener"><img src="/api/news/image?key=${encodeURIComponent(x.url_key)}" alt="" loading="lazy" onerror="this.remove()"></a><div class="content"><a class="title" href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.title)}</a><div class="sum">${String(x.summary||'').split('\n').map(s=>`<div class="sline">${esc(s)}</div>`).join('')}</div>${relatedHtml(x)}</div></div><div class="actions">${actions}</div></article>`;
}
function render(){
  nav();renderHero();
  const labels={saved:['저장한 뉴스',''],popular:['최근 한 달 인기 뉴스',''],baduk:['최근 한 달 바둑 뉴스',''],home:['이번 주 주목할 뉴스','']};
  const label=labels[state.mode]||(state.category?[`${state.category} 최신 뉴스`,'']:['최근 한 달 최신 뉴스','']);
  $('sectionTitle').innerHTML=`${esc(label[0])}${label[1]?`<span class="sectionDesc">${esc(label[1])}</span>`:''}`;
  const visible=state.items;
  $('cards').innerHTML=visible.length?visible.map(cardHtml).join(''):'<div class="empty">조건에 맞는 뉴스가 아직 없습니다.</div>';
}
async function load({silent=false}={}){
  const requestId=++state.requestSeq;nav();
  if(!silent)$('cards').innerHTML='<div class="empty">뉴스를 불러오는 중입니다.</div>';
  const view=state.mode==='home'?'home':state.mode==='saved'?'saved':state.mode==='popular'?'popular':'latest';
  const p=new URLSearchParams({limit:state.mode==='home'?'30':state.mode==='baduk'?'300':'300',view});
  const category=state.mode==='baduk'?'바둑':state.category;
  if(category)p.set('category',category);
  if(state.mode==='latest'||state.mode==='popular')p.set('exclude_baduk','1');
  if(state.q)p.set('q',state.q);
  try{
    if(state.mode==='home'&&!state.q){
      const common='';
      const badukHome=state.heroTopic==='baduk';
      const heroUrl=badukHome
        ? '/api/news/articles?view=latest&category=%EB%B0%94%EB%91%91&limit=6&hours=168'
        : `/api/news/articles?view=popular&limit=6&hours=24${common}`;
      const cardsUrl=badukHome
        ? '/api/news/articles?view=latest&category=%EB%B0%94%EB%91%91&limit=100&hours=168'
        : `/api/news/articles?view=home&limit=30&hours=168${common}`;
      const [home,popular]=await Promise.all([fetchJson(cardsUrl),fetchJson(heroUrl)]);
      if(requestId!==state.requestSeq)return;
      state.heroItems=popular.items||[];
      state.items=home.items||[];
    }else{
      const d=await fetchJson(`/api/news/articles?${p}`);if(requestId!==state.requestSeq)return;
      state.heroItems=[];state.items=d.items||[];
    }
    render()
  }
  catch(e){if(requestId===state.requestSeq&&!silent)$('cards').innerHTML=`<div class="empty">${esc(e.message||'불러오기 실패')}</div>`}
}
document.addEventListener('click',e=>{
  const hot=e.target.dataset.hot;
  if(hot){state.heroTopic=hot;load({silent:true});return}
  const view=e.target.dataset.view;
  if(view){state.mode=view;state.category='';state.q='';$('query').value='';load();return}
  const category=e.target.dataset.cat;
  if(category){state.category=category;load()}
});
$('cards').addEventListener('click',async e=>{
  const action=e.target.dataset.action;if(!action)return;
  const button=e.target,card=button.closest('.card'),key=card.dataset.key;
  button.disabled=true;
  try{
    const r=await fetch('/api/news/item',{method:'POST',headers:{'content-type':'application/json','x-news-user':userId},body:JSON.stringify({action,url_key:key})});
    if(!r.ok)throw Error();
    const item=state.items.find(x=>x.url_key===key);
    if(action==='save'&&item){item.saved=1;button.dataset.action='unsave';button.textContent='저장됨';button.classList.add('on');button.disabled=false;toast('기사를 저장했습니다.');return}
    if(action==='unsave'&&state.mode!=='saved'&&item){item.saved=0;button.dataset.action='save';button.textContent='저장';button.classList.remove('on');button.disabled=false;toast('저장을 해제했습니다.');return}
    card.classList.add('removing');setTimeout(()=>{state.items=state.items.filter(x=>x.url_key!==key);card.remove();if(!$('cards').querySelector('.card'))render()},180);toast(action==='hide'?'기사를 삭제했습니다.':'저장을 해제했습니다.');
  }catch{button.disabled=false;toast('처리하지 못했습니다. 다시 시도해 주세요.')}
});
$('search').onsubmit=e=>{e.preventDefault();state.q=$('query').value.trim();load()};
nav();load();
setInterval(()=>load({silent:true}),300000);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')load({silent:true})});
</script></body></html>
