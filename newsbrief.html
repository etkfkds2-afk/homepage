<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NewsBrief</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--chip:#f3f4f6;--go:#0f766e;--shadow-sm:0 1px 2px rgba(16,24,40,.06);--shadow-md:0 14px 34px rgba(16,24,40,.12)}*{box-sizing:border-box}body{font-family:ui-sans-serif,system-ui,-apple-system,"Noto Sans KR",sans-serif;margin:22px auto;padding:0 20px;max-width:1480px;color:var(--text);background:var(--bg);font-size:14.5px;line-height:1.45}button,input{font:inherit}.top{position:sticky;top:12px;z-index:20;display:flex;gap:18px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px;padding:16px 18px;border:1px solid rgba(229,231,235,.78);border-radius:20px;background:rgba(255,255,255,.9);box-shadow:0 14px 36px rgba(16,24,40,.07);backdrop-filter:blur(10px)}.brand{font-weight:950;font-size:18px;letter-spacing:-.3px}.tagline{margin-top:7px;color:var(--muted);font-size:12.5px;line-height:1.5}.controls{display:flex;flex-direction:column;gap:10px;align-items:flex-end}.modebar,.filterbar,.searchbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.pill{padding:7px 11px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.9);font-size:13px;font-weight:700;cursor:pointer}.pill.on{background:#111827;color:#fff;border-color:#111827;box-shadow:0 10px 18px rgba(17,24,39,.16)}.pill.baduk{border-color:rgba(15,118,110,.28);color:var(--go)}.pill.baduk:before{content:"●";margin-right:6px;font-size:11px}.pill.baduk.on{background:var(--go);color:#fff}.filterbar .pill{padding:5px 11px;font-size:11.5px;color:#64748b}.searchbar input{padding:9px 12px;border:1px solid #d1d5db;border-radius:12px;min-width:250px;outline:none}.searchbar button{padding:9px 12px;border:1px solid #d1d5db;border-radius:12px;background:#fff;font-weight:900;cursor:pointer}.homehero{margin:10px 0 32px}.home-date{font-weight:950;font-size:20px;margin:4px 2px 12px;letter-spacing:-.55px}.hotcard{border:1px solid rgba(15,23,42,.1);border-radius:22px;background:#fff;box-shadow:0 18px 40px rgba(15,23,42,.06);padding:18px}.hothead{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}.hotbadge{display:inline-flex;height:28px;padding:0 12px;align-items:center;border-radius:999px;background:#0b1220;color:#fff;font-size:11px;font-weight:950;letter-spacing:.9px}.hotmeta{margin-left:8px;color:#475569;font-size:12px;font-weight:850}.hottitle{margin-top:8px;font-size:22px;font-weight:950;letter-spacing:-.6px}.hotsub{margin-top:6px;color:#64748b;font-size:13px;font-weight:750}.hotpage{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;background:rgba(248,250,252,.7)}.hotchip{display:flex;align-items:center;gap:12px;min-height:56px;padding:12px 14px;border-bottom:1px solid #e2e8f0;text-decoration:none;color:#0b1220}.hotchip:nth-child(odd){border-right:1px solid #e2e8f0}.hotchip:hover{background:rgba(15,23,42,.035)}.hotrank{display:inline-flex;width:34px;height:22px;align-items:center;justify-content:center;border-radius:8px;background:rgba(15,23,42,.05);font-size:12px;font-weight:950}.hottext{flex:1;min-width:0;font-size:14px;font-weight:900;line-height:1.35}.sectionTitle{margin:18px 12px 10px;font-size:16px;font-weight:950}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.card{display:flex;flex-direction:column;border:1px solid rgba(229,231,235,.95);border-radius:18px;background:var(--card);padding:15px;min-height:154px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:.12s}.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}.card.cat-baduk{border-color:rgba(15,118,110,.28);background:linear-gradient(180deg,rgba(15,118,110,.06),#fff 44%)}.card.cat-baduk:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--go)}.meta{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}.meta-left,.meta-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.tag{padding:2px 9px;border:1px solid var(--line);border-radius:999px;font-size:11px;background:var(--chip);color:#374151;font-weight:650}.time{color:var(--muted);font-size:11px;font-weight:700}.row{display:flex;gap:12px;align-items:flex-start}.thumb{flex:0 0 92px;width:92px;height:92px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:linear-gradient(135deg,#fafafa,#f1f3f7)}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.content{flex:1;min-width:0}.title{font-weight:750;font-size:15px;line-height:1.4;letter-spacing:-.2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-decoration:none}.title:hover{text-decoration:underline}.sum{margin-top:10px;color:#111827;font-size:13px;line-height:1.65}.sline+.sline{margin-top:7px}.actions{display:flex;justify-content:flex-end;gap:6px;margin-top:auto;padding-top:10px}.act{display:inline-flex;align-items:center;padding:6px 9px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:11px;font-weight:720}.act.on{background:#111827;border-color:#111827;color:#fff}.act.del{color:#6b7280}.empty{grid-column:1/-1;border:1px dashed #d1d5db;border-radius:18px;background:#fff;padding:40px;text-align:center;color:#6b7280}.status{font-size:12px;color:var(--muted)}
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}body{margin:16px auto;padding:0 14px}}@media(max-width:680px){.top{position:relative;top:0}.controls,.searchbar{width:100%;align-items:stretch}.modebar,.filterbar{justify-content:flex-start}.searchbar input{flex:1;min-width:0}.grid,.hotpage{grid-template-columns:1fr}.hotchip:nth-child(odd){border-right:0}.thumb{flex-basis:82px;width:82px;height:82px}}
.title{color:var(--text)}
</style></head><body>
<header class="top"><div><div class="brand">NewsBrief</div><div class="tagline">오늘의 뉴스를 3줄로 정리해, 판단을 가볍게.<br>중요한 기사만 저장하고 미래의 나에게 남기세요.</div></div><div class="controls"><div class="modebar"><button class="pill on" data-view="home">홈</button><button class="pill" data-view="latest">최신순</button><button class="pill" data-view="saved">저장</button><button class="pill baduk" data-view="baduk">바둑</button><span class="status" id="status">연결 확인 중</span></div><div class="filterbar" id="categories"></div><form class="searchbar" id="search"><input id="query" placeholder="제목/요약/본문 검색"><button>검색</button></form></div></header>
<section class="homehero" id="hero"><div class="home-date" id="date"></div><div class="hotcard"><div class="hothead"><div><span class="hotbadge">24H</span><span class="hotmeta" id="updated"></span><div class="hottitle">오늘의 브리핑</div><div class="hotsub">지금 주목할 기사만 한 페이지에 정리했습니다.</div></div></div><div class="hotpage" id="hot"></div></div></section>
<div class="sectionTitle" id="sectionTitle">핵심 뉴스</div><main class="grid" id="cards"><div class="empty">뉴스를 불러오는 중입니다.</div></main>
<script>
const cats=['정치','경제','사회','생활/문화','세계','IT/과학'];const state={mode:'home',category:'',q:'',items:[]};const $=id=>document.getElementById(id);const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const fmt=v=>{const d=new Date(v);return Number.isNaN(+d)?'':new Intl.DateTimeFormat('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}).format(d)};
function nav(){document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('on',b.dataset.view===state.mode));$('categories').innerHTML=cats.map(c=>`<button class="pill ${state.category===c?'on':''}" data-cat="${c}">${c}</button>`).join('')}
function renderHero(){const show=state.mode==='home'&&!state.q;$('hero').style.display=show?'block':'none';if(!show)return;const now=new Date();$('date').textContent=new Intl.DateTimeFormat('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'}).format(now);$('updated').textContent=`${fmt(now)} 업데이트`;$('hot').innerHTML=state.items.slice(0,8).map((x,i)=>`<a class="hotchip" href="${esc(x.url)}" target="_blank" rel="noopener"><span class="hotrank">${String(i+1).padStart(2,'0')}</span><span class="hottext">${esc(x.title)}</span><span>↗</span></a>`).join('')}
function render(){renderHero();$('sectionTitle').textContent=state.mode==='saved'?'저장된 뉴스':state.mode==='baduk'?'바둑 뉴스':state.mode==='home'?'핵심 뉴스':state.category?`${state.category} 최신 뉴스`:'최신 뉴스';$('cards').innerHTML=state.items.length?state.items.map(x=>`<article class="card ${x.category==='바둑'?'cat-baduk':''}" data-key="${esc(x.url_key)}"><div class="meta"><div class="meta-left"><span class="tag">${esc(x.source==='NAVER'?'네이버':x.source)}</span><span class="tag">${esc(x.category)}</span>${x.press?`<span class="tag">${esc(x.press)}</span>`:''}</div><span class="time">${esc(fmt(x.published_at||x.fetched_at))}</span></div><div class="row"><a class="thumb" href="${esc(x.url)}" target="_blank" rel="noopener">${x.image_url?`<img src="${esc(x.image_url)}" alt="" loading="lazy" onerror="this.remove()">`:''}</a><div class="content"><a class="title" href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.title)}</a><div class="sum">${String(x.summary||'').split('\n').map(s=>`<div class="sline">${esc(s)}</div>`).join('')}</div></div></div><div class="actions"><button class="act ${x.saved?'on':''}" data-action="${x.saved?'unsave':'save'}">${x.saved?'저장됨':'저장'}</button>${state.mode!=='saved'?'<button class="act del" data-action="hide">삭제</button>':''}</div></article>`).join(''):'<div class="empty">검색된 결과가 없습니다.</div>'}
async function load(){nav();$('cards').innerHTML='<div class="empty">뉴스를 불러오는 중입니다.</div>';const p=new URLSearchParams({limit:state.mode==='home'?'24':'150',view:state.mode==='saved'?'saved':'latest'});const cat=state.mode==='baduk'?'바둑':state.category;if(cat)p.set('category',cat);if(state.q)p.set('q',state.q);try{const r=await fetch(`/api/news/articles?${p}`),d=await r.json();if(!r.ok)throw Error(d.error);state.items=d.items||[];render()}catch(e){$('cards').innerHTML=`<div class="empty">${esc(e.message||'불러오기 실패')}</div>`}}
async function status(){try{const d=await fetch('/api/news/status').then(r=>r.json());$('status').textContent=d.ok?`${d.article_count}건 · 자동 수집 정상`:'연결 오류'}catch{$('status').textContent='연결 오류'}}
document.addEventListener('click',e=>{const view=e.target.dataset.view;if(view){state.mode=view;state.category='';state.q='';$('query').value='';load()}const cat=e.target.dataset.cat;if(cat){state.mode='latest';state.category=cat;load()}});$('cards').addEventListener('click',async e=>{const action=e.target.dataset.action;if(!action)return;const card=e.target.closest('.card');e.target.disabled=true;try{const r=await fetch('/api/news/item',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({action,url_key:card.dataset.key})});if(!r.ok)throw Error();load()}catch{e.target.disabled=false;alert('처리하지 못했습니다.')}});$('search').onsubmit=e=>{e.preventDefault();state.q=$('query').value.trim();load()};
const savedButton=document.querySelector('[data-view="saved"]');savedButton.insertAdjacentHTML('beforebegin','<button class="pill" data-view="popular24">일간 인기순</button><button class="pill" data-view="popular7">주간 인기순</button>');
const baseLoad=load;load=async function(){if(!state.mode.startsWith('popular'))return baseLoad();nav();$('cards').innerHTML='<div class="empty">뉴스를 불러오는 중입니다.</div>';const p=new URLSearchParams({limit:'150',view:state.mode});if(state.category)p.set('category',state.category);if(state.q)p.set('q',state.q);try{const r=await fetch(`/api/news/articles?${p}`),d=await r.json();if(!r.ok)throw Error(d.error);state.items=d.items||[];render();$('sectionTitle').textContent=state.mode==='popular7'?'주간 인기순':'일간 인기순'}catch(e){$('cards').innerHTML=`<div class="empty">${esc(e.message||'불러오기 실패')}</div>`}};
new MutationObserver(()=>document.querySelectorAll('.card img').forEach(img=>{if(img.dataset.proxied)return;const card=img.closest('.card');if(!card)return;img.dataset.proxied='1';img.src=`/api/news/image?key=${encodeURIComponent(card.dataset.key)}`})).observe($('cards'),{childList:true,subtree:true});
nav();load();status();setInterval(()=>{load();status()},300000);
</script></body></html>
