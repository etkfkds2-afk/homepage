name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '7,37 * * * *'

jobs:
  deploy:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          rm -rf dist
          mkdir dist
          cp index.html dist/index.html
          cp newsbrief.html dist/newsbrief.html

      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: af27f3bbca2209ff9cb2c77a2e47184a
          projectName: homepage
          directory: dist
          branch: main

  collect-news:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger NewsBrief collection
        env:
          NEWSBRIEF_COLLECT_TOKEN: ${{ secrets.NEWSBRIEF_COLLECT_TOKEN }}
        run: |
          curl --fail-with-body --retry 3 --max-time 240 \
            -X POST \
            -H "Authorization: Bearer ${NEWSBRIEF_COLLECT_TOKEN}" \
            https://homepage-8fj.pages.dev/api/news/collect
