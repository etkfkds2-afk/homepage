name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '7,37 * * * *'

jobs:
  deploy:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          rm -rf dist
          mkdir dist
          cp index.html dist/index.html
          cp newsbrief.html dist/newsbrief.html

      - name: Ensure Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          status=$(curl -sS -o /tmp/pages-project.json -w '%{http_code}' \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/af27f3bbca2209ff9cb2c77a2e47184a/pages/projects/newsbrief-etkfkds2")
          if [ "$status" = "404" ]; then
            curl --fail-with-body -sS \
              -X POST \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"name":"newsbrief-etkfkds2","production_branch":"main"}' \
              "https://api.cloudflare.com/client/v4/accounts/af27f3bbca2209ff9cb2c77a2e47184a/pages/projects"
          elif [ "$status" != "200" ]; then
            cat /tmp/pages-project.json
            exit 1
          fi

      - name: Configure NewsBrief runtime secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          NEWSBRIEF_COLLECT_TOKEN: ${{ secrets.NEWSBRIEF_COLLECT_TOKEN }}
        run: |
          jq -n \
            --arg naver_id "$NAVER_CLIENT_ID" \
            --arg naver_secret "$NAVER_CLIENT_SECRET" \
            --arg kakao_key "$KAKAO_REST_API_KEY" \
            --arg collect_token "$NEWSBRIEF_COLLECT_TOKEN" \
            '{deployment_configs:{production:{env_vars:{
              NAVER_CLIENT_ID:{type:"secret_text",value:$naver_id},
              NAVER_CLIENT_SECRET:{type:"secret_text",value:$naver_secret},
              KAKAO_REST_API_KEY:{type:"secret_text",value:$kakao_key},
              NEWSBRIEF_COLLECT_TOKEN:{type:"secret_text",value:$collect_token}
            }}}}' > /tmp/pages-settings.json
          curl --fail-with-body -sS \
            -X PATCH \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @/tmp/pages-settings.json \
            "https://api.cloudflare.com/client/v4/accounts/af27f3bbca2209ff9cb2c77a2e47184a/pages/projects/newsbrief-etkfkds2" \
            > /tmp/pages-settings-response.json

      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: af27f3bbca2209ff9cb2c77a2e47184a
          projectName: newsbrief-etkfkds2
          directory: dist
          branch: main

  collect-news:
    needs: deploy
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger NewsBrief collection
        env:
          NEWSBRIEF_COLLECT_TOKEN: ${{ secrets.NEWSBRIEF_COLLECT_TOKEN }}
        run: |
          runs=1
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then runs=10; fi
          for i in $(seq 1 "$runs"); do
            curl --fail-with-body --retry 3 --max-time 240 \
              -X POST \
              -H "Authorization: Bearer ${NEWSBRIEF_COLLECT_TOKEN}" \
              https://newsbrief-etkfkds2.pages.dev/api/news/collect
          done
