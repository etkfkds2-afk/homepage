name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      backfill:
        description: '최근 한 달 백필과 바둑 요약 복구 실행'
        required: false
        default: false
        type: boolean
      classify_category:
        description: 'Claude로 이슈 키워드 재분류할 카테고리 (비우면 건너뜀)'
        required: false
        default: ''
        type: choice
        options: ['', '바둑', '최신순', '인기순']
  schedule:
    # GitHub may delay scheduled jobs during busy periods. Running every 15
    # Collect and refresh all news views every three hours. URL keys in D1 make
    # each collection idempotent, so a slower cadence avoids needless requests.
    - cron: '0 */3 * * *'

jobs:
  deploy:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          rm -rf dist
          mkdir dist
          cp newsbrief.html dist/index.html
          cp newsbrief.html dist/newsbrief.html

      - name: Ensure Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          status=$(curl -sS -o /tmp/pages-project.json -w '%{http_code}' \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/af27f3bbca2209ff9cb2c77a2e47184a/pages/projects/newsbrief-etkfkds2")
          if [ "$status" = "404" ]; then
            curl --fail-with-body -sS \
              -X POST \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"name":"newsbrief-etkfkds2","production_branch":"main"}' \
              "https://api.cloudflare.com/client/v4/accounts/af27f3bbca2209ff9cb2c77a2e47184a/pages/projects"
          elif [ "$status" != "200" ]; then
            cat /tmp/pages-project.json
            exit 1
          fi

      - name: Configure NewsBrief runtime secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          NEWSBRIEF_COLLECT_TOKEN: ${{ secrets.NEWSBRIEF_COLLECT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          jq -n \
            --arg naver_id "$NAVER_CLIENT_ID" \
            --arg naver_secret "$NAVER_CLIENT_SECRET" \
            --arg kakao_key "$KAKAO_REST_API_KEY" \
            --arg collect_token "$NEWSBRIEF_COLLECT_TOKEN" \
            --arg anthropic_key "$ANTHROPIC_API_KEY" \
            '{deployment_configs:{production:{env_vars:{
              NAVER_CLIENT_ID:{type:"secret_text",value:$naver_id},
              NAVER_CLIENT_SECRET:{type:"secret_text",value:$naver_secret},
              KAKAO_REST_API_KEY:{type:"secret_text",value:$kakao_key},
              NEWSBRIEF_COLLECT_TOKEN:{type:"secret_text",value:$collect_token},
              ANTHROPIC_API_KEY:{type:"secret_text",value:$anthropic_key},
              NEWSBRIEF_USE_ANTHROPIC:{type:"plain_text",value:"0"}
            }}}}' > /tmp/pages-settings.json
          curl --fail-with-body -sS \
            -X PATCH \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @/tmp/pages-settings.json \
            "https://api.cloudflare.com/client/v4/accounts/af27f3bbca2209ff9cb2c77a2e47184a/pages/projects/newsbrief-etkfkds2" \
            > /tmp/pages-settings-response.json

      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: af27f3bbca2209ff9cb2c77a2e47184a
          projectName: newsbrief-etkfkds2
          directory: dist
          branch: main

  collect-news:
    needs: deploy
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    concurrency:
      group: newsbrief-collector
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Discover Google News and trigger collection
        env:
          NEWSBRIEF_COLLECT_TOKEN: ${{ secrets.NEWSBRIEF_COLLECT_TOKEN }}
          NEWSBRIEF_BACKFILL: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill && '1' || '0' }}
        run: node scripts/google-news-discovery.mjs

      - name: Trigger NewsBrief collection
        env:
          NEWSBRIEF_COLLECT_TOKEN: ${{ secrets.NEWSBRIEF_COLLECT_TOKEN }}
        run: |
          runs=0
          # Backfills use more small requests instead of a few large requests so
          # each Pages Worker invocation stays below its CPU time limit.
          if [ "${{ inputs.backfill }}" = "true" ]; then runs=18; fi
          for i in $(seq 1 "$runs"); do
            endpoint="https://newsbrief-etkfkds2.pages.dev/api/news/collect"
            if [ "${{ inputs.backfill }}" = "true" ]; then endpoint="${endpoint}?backfill=1&force_retry=1"; fi
            curl --fail-with-body --retry 3 --max-time 240 \
              -X POST \
              -H "Authorization: Bearer ${NEWSBRIEF_COLLECT_TOKEN}" \
              "$endpoint"
          done
          if [ "${{ inputs.backfill }}" = "true" ]; then
            for i in $(seq 1 10); do
              curl --fail-with-body --retry 3 --max-time 240 \
                -X POST \
                -H "Authorization: Bearer ${NEWSBRIEF_COLLECT_TOKEN}" \
                "https://newsbrief-etkfkds2.pages.dev/api/news/collect?repair=1&force_retry=1"
            done
          fi

  classify-issues:
    needs: deploy
    if: always() && github.event_name == 'workflow_dispatch' && inputs.classify_category != ''
    runs-on: ubuntu-latest
    steps:
      - name: Classify issue keywords with Claude
        env:
          NEWSBRIEF_COLLECT_TOKEN: ${{ secrets.NEWSBRIEF_COLLECT_TOKEN }}
        run: |
          curl --fail-with-body -sS --retry 2 --max-time 120 \
            -X POST \
            -H "Authorization: Bearer ${NEWSBRIEF_COLLECT_TOKEN}" \
            "https://newsbrief-etkfkds2.pages.dev/api/news/classify-issues?category=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "${{ inputs.classify_category }}")" \
            | tee /tmp/classify-result.json
          echo
          python3 -m json.tool /tmp/classify-result.json
